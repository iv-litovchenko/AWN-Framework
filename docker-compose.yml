################################################
# AWN-Framework — инфраструктура агента
#
# Стек:
#   ollama      — локальные LLM и эмбеддинги (без OpenAI API)
#   qdrant      — векторная БД, хранит эмбеддинги нод
#   indexer     — следит за vault, при изменении *.node.md переиндексирует
#   mcp-server  — принимает запрос от агента, ищет в Qdrant, возвращает куски
#   n8n         — исполнитель автоматизаций (ноды с AWN-AUTOMATIZATION: true)
#
# Поток данных (RAG):
#   vault/*.node.md → indexer → Qdrant → mcp-server → агент (Claude / Cursor)
#
# Поток автоматизации:
#   AGENTS.NODES.md (AWN-CRON) → n8n → вызов агента → обновление vault
#
# Настройка:
#   Скопируй .env.example → .env и заполни переменные перед запуском.
################################################

services:

  # ─── Локальные LLM и эмбеддинги ──────────────────────────────────────────
  # После запуска: docker exec -it ollama ollama pull nomic-embed-text
  # UI моделей: нет (только API на :11434)
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - awn

  # ─── Векторная БД ─────────────────────────────────────────────────────────
  # Хранит эмбеддинги чанков из *.node.md
  # UI (опционально): http://localhost:6333/dashboard
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    depends_on:
      - ollama
    networks:
      - awn

  # ─── Индексатор vault ─────────────────────────────────────────────────────
  # Следит за изменениями в vault, разбивает ноды на чанки и векторизует
  indexer:
    build: ./indexer
    volumes:
      - ${VAULT_PATH}:/vault:ro
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - WATCH_PATH=/vault
    restart: unless-stopped
    depends_on:
      - qdrant
      - ollama
    networks:
      - awn

  # ─── MCP-сервер для агента ────────────────────────────────────────────────
  # Принимает запрос, ищет релевантные куски нод в Qdrant, возвращает агенту
  # Подключить в Cursor: MCP → http://localhost:3000
  mcp-server:
    build: ./mcp
    ports:
      - "3000:3000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
    restart: unless-stopped
    depends_on:
      - qdrant
      - ollama
    networks:
      - awn

  # ─── Автоматизация (n8n) ──────────────────────────────────────────────────
  # Исполнитель нод с AWN-AUTOMATIZATION: true по расписанию AWN-CRON
  # UI: http://localhost:5678
  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ${VAULT_PATH}:/vault:ro
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:?set N8N_PASSWORD in .env}
      - GENERIC_TIMEZONE=${TZ:-Europe/Moscow}
      - N8N_HOST=localhost
      - N8N_PORT=5678
    restart: unless-stopped
    depends_on:
      - mcp-server
    networks:
      - awn

  # ─── VPN (WireGuard через wg-easy) ────────────────────────────────────────
  # UI: http://localhost:51821
  # Клиенты подключаются к WG_HOST:51820/udp
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    ports:
      - "51820:51820/udp"
      - "51821:51821"
    volumes:
      - wg_easy_data:/etc/wireguard
    environment:
      - WG_HOST=${WG_HOST:?set WG_HOST in .env}
      - PASSWORD=${WG_PASSWORD:?set WG_PASSWORD in .env}
      - WG_DEFAULT_DNS=1.1.1.1,1.0.0.1
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped
    networks:
      - awn

# ─── Тома ─────────────────────────────────────────────────────────────────
volumes:
  ollama_data:
  qdrant_data:
  n8n_data:
  wg_easy_data:

# ─── Сеть ─────────────────────────────────────────────────────────────────
networks:
  awn:
    driver: bridge
