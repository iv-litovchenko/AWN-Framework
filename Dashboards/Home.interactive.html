<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AWN Vault Dashboard</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1f2430;
      --text: #e8ecf1;
      --muted: #a2acb9;
      --accent: #6ea8fe;
      --border: #2b3240;
      --ok: #4fd18b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #0d1016 0%, #121722 100%);
      color: var(--text);
    }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 24px; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .title { font-size: 28px; margin: 0; }
    .sub { color: var(--muted); margin: 6px 0 0; }
    .clock {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      margin: 16px 0 22px;
    }
    input[type="search"] {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 12px 14px;
      outline: none;
    }
    .chip {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
    }
    .chip.active {
      background: rgba(110, 168, 254, 0.16);
      color: var(--accent);
      border-color: rgba(110, 168, 254, 0.45);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 12px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      display: block;
      text-decoration: none;
      color: inherit;
      transition: transform 0.14s ease, border-color 0.14s ease, background 0.14s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: #3b4b65;
      background: var(--panel-2);
    }
    .card h3 { margin: 4px 0 8px; font-size: 17px; }
    .card p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.35; }
    .meta {
      display: inline-block;
      margin-top: 10px;
      font-size: 12px;
      color: var(--ok);
    }
    .empty {
      margin-top: 14px;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <div>
        <h1 class="title">Vault Dashboard</h1>
        <p class="sub">Интерактивная навигация по ключевым заметкам</p>
      </div>
      <div id="clock" class="clock"></div>
    </header>

    <div class="toolbar">
      <input id="search" type="search" placeholder="Поиск по названию или описанию...">
      <button class="chip active" data-filter="all">Все</button>
      <button class="chip" data-filter="domain">Домены</button>
      <button class="chip" data-filter="system">Система</button>
      <button class="chip" data-filter="inbox">Входящие</button>
    </div>

    <main>
      <div id="cards" class="grid"></div>
      <div id="empty" class="empty">Ничего не найдено. Попробуй убрать фильтр или изменить поиск.</div>
    </main>
  </div>

  <script>
    const LINKS = [
      { title: "Home.md", path: "Dashboards/Home.md", desc: "Markdown-дашборд для работы в Obsidian", tag: "system" },
      { title: "Domains Index", path: "Domains/Index.node.md", desc: "Общий реестр доменов пользователя", tag: "domain" },
      { title: "Categories", path: "Domains/Categories.node.md", desc: "Справочник категорий доменов", tag: "domain" },
      { title: "Assistant Area", path: "Assistant.Ai/Area.node.md", desc: "Правила и структура области ассистента", tag: "system" },
      { title: "Inbox Area", path: "Inbox/Area.node.md", desc: "Быстрый вход для неразобранных материалов", tag: "inbox" },
      { title: "Tests Area", path: "Tests/Area.node.md", desc: "Песочница для тестов и экспериментов", tag: "system" }
    ];

    const cards = document.getElementById("cards");
    const empty = document.getElementById("empty");
    const search = document.getElementById("search");
    const chips = [...document.querySelectorAll(".chip")];
    let currentFilter = "all";

    function render() {
      const q = search.value.trim().toLowerCase();
      const data = LINKS.filter(item => {
        const passFilter = currentFilter === "all" || item.tag === currentFilter;
        const hay = `${item.title} ${item.path} ${item.desc}`.toLowerCase();
        const passSearch = !q || hay.includes(q);
        return passFilter && passSearch;
      });

      cards.innerHTML = data.map(item => `
        <a class="card" href="${item.path}">
          <h3>${item.title}</h3>
          <p>${item.desc}</p>
          <span class="meta">${item.path}</span>
        </a>
      `).join("");

      empty.style.display = data.length ? "none" : "block";
    }

    chips.forEach(chip => {
      chip.addEventListener("click", () => {
        chips.forEach(c => c.classList.remove("active"));
        chip.classList.add("active");
        currentFilter = chip.dataset.filter;
        render();
      });
    });

    search.addEventListener("input", render);

    function tickClock() {
      const now = new Date();
      document.getElementById("clock").textContent =
        now.toLocaleDateString("ru-RU") + " " + now.toLocaleTimeString("ru-RU");
    }
    setInterval(tickClock, 1000);
    tickClock();
    render();
  </script>
</body>
</html>
